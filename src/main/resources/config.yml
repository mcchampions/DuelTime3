core:
  prefix: "&7&l[&bDuelTime&7&l] "
  language: "zh_CN"

database:
  type: sqlite
  mysql:
    host: localhost
    port: 3306
    database: dueltime
    username: root
    password: ""

arena:
  defaults:
    classic:
      countdown: 5
      countdown-freeze: true
      time-limit: 300
      allow-spectate: true
      show-health-bossbar: true
      reward:
        win-exp: 30
        win-point: 1
        lose-exp-rate: 0.3
      win-streak:
        enabled: true
        bonus-point:
          "2": 1
          "3": 2
          "5": 3
          "10": 5
        bonus-exp-rate:
          "3": 0.2
          "5": 0.5
          "10": 1.0
      auto-respawn: true
      delayed-back: 5
    team:
      team-size: 2
      countdown: 10
      time-limit: 600
    ffa:
      min-players: 3
      max-players: 8
      countdown: 10
      time-limit: 600

level:
  chat-prefix: "&f[%level%&f]"
  tiers:
    - {level: 0, title: "&7无段位", exp-to-next: 10}
    - {level: 1, title: "&2青铜I", exp-to-next: 20}
    - {level: 3, title: "&2青铜II", exp-to-next: 25}
    - {level: 5, title: "&2青铜III", exp-to-next: 30}
    - {level: 10, title: "&3黑铁I", exp-to-next: 35}
    - {level: 15, title: "&3黑铁II", exp-to-next: 40}
    - {level: 20, title: "&3黑铁III", exp-to-next: 50}
    - {level: 25, title: "&e黄金I", exp-to-next: 60}
    - {level: 30, title: "&e黄金II", exp-to-next: 70}
    - {level: 35, title: "&e黄金III", exp-to-next: 80}
    - {level: 40, title: "&b钻石I", exp-to-next: 90}
    - {level: 45, title: "&b钻石II", exp-to-next: 100}
    - {level: 50, title: "&b钻石III", exp-to-next: 115}
    - {level: 55, title: "&b钻石IV", exp-to-next: 130}
    - {level: 60, title: "&b钻石V", exp-to-next: 150}

ranking:
  refresh-seconds: 30
  hologram:
    enabled: true
    max-size: 10

record:
  show-cooldown: 10
  print-cost: 1

shop:
  items:
    - id: "diamond_sword"
      material: DIAMOND_SWORD
      name: "&b钻石剑"
      lore:
        - "&7一把锋利的钻石剑"
      cost: 50
      commands:
        - "give %player% diamond_sword 1"
    - id: "exp_bottle"
      material: EXPERIENCE_BOTTLE
      name: "&e经验瓶 x16"
      cost: 20
      commands:
        - "give %player% experience_bottle 16"

migration:
  enabled: false
  old-plugin-folder: "plugins/DuelTime3"
  old-database:
    type: sqlite
    sqlite:
      path: "plugins/DuelTime3/dueltime.db"
    mysql:
      host: localhost
      port: 3306
      database: dueltime
      username: root
      password: ""
